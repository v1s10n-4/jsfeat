<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jsfeat Demos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    #sidebar {
      width: 220px;
      background: #16213e;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #0f3460;
    }
    #sidebar h1 {
      font-size: 1.3rem;
      padding: 0 20px 16px;
      border-bottom: 1px solid #0f3460;
      color: #e94560;
    }
    #sidebar nav { flex: 1; padding: 10px 0; }
    #sidebar a {
      display: block;
      padding: 10px 20px;
      color: #a0a0c0;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.15s, color 0.15s;
    }
    #sidebar a:hover { background: #0f3460; color: #fff; }
    #sidebar a.active { background: #0f3460; color: #e94560; font-weight: 600; }
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 0.85rem;
      color: #888;
    }
    #display {
      position: relative;
      border: 2px solid #0f3460;
      border-radius: 4px;
      overflow: hidden;
    }
    #canvas { display: block; }
    #video { display: none; }
    #fps {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      color: #0f0;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 0.8rem;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>jsfeat</h1>
    <nav id="nav"></nav>
  </div>
  <div id="main">
    <p id="info">Select a demo from the sidebar</p>
    <div id="display">
      <canvas id="canvas" width="640" height="480"></canvas>
      <video id="video" width="640" height="480" autoplay playsinline></video>
      <div id="fps"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
