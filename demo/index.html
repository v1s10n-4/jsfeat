<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jsfeat Demos</title>
  <style>
    /* ---- custom properties ---- */
    :root {
      --bg:          #1a1a2e;
      --bg-sidebar:  #16213e;
      --bg-panel:    #1e1e38;
      --border:      #0f3460;
      --accent:      #e94560;
      --accent-dim:  #c03050;
      --text:        #e0e0e0;
      --text-muted:  #a0a0c0;
      --text-dim:    #666;
      --success:     #00ff88;
      --info:        #00ccff;
      --sidebar-w:   220px;
      --controls-w:  240px;
      --toolbar-h:   44px;
    }

    /* ---- reset ---- */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ---- top-level page layout ---- */
    .page {
      display: flex;
      height: 100vh;
    }

    /* ---- sidebar ---- */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    #sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    #sidebar-header h1 {
      font-size: 1.3rem;
      color: var(--accent);
    }
    #nav { flex: 1; padding: 8px 0; overflow-y: auto; }

    /* nav group */
    .nav-group { margin-bottom: 2px; }
    .nav-group-header {
      display: flex;
      align-items: center;
      padding: 8px 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .nav-group-header::before {
      content: '\25BE';
      margin-right: 6px;
      font-size: 0.7rem;
      transition: transform 0.15s;
    }
    .nav-group.collapsed .nav-group-header::before {
      transform: rotate(-90deg);
    }
    .nav-group.collapsed .nav-group-list {
      display: none;
    }
    .nav-group-list a {
      display: block;
      padding: 7px 20px 7px 32px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: background 0.12s, color 0.12s;
    }
    .nav-group-list a:hover { background: var(--border); color: #fff; }
    .nav-group-list a.active { background: var(--border); color: var(--accent); font-weight: 600; }

    .nav-separator {
      height: 1px;
      background: var(--border);
      margin: 8px 16px;
    }
    /* Extra links outside groups */
    #nav > a {
      display: block;
      padding: 8px 20px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: background 0.12s, color 0.12s;
    }
    #nav > a:hover { background: var(--border); color: #fff; }
    #nav > a.active { background: var(--border); color: var(--accent); font-weight: 600; }

    /* ---- main area ---- */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    /* toolbar */
    #toolbar {
      height: var(--toolbar-h);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
    }
    .tb-select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .tb-btn {
      background: var(--bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .tb-btn:hover { background: var(--border); color: #fff; }
    .tb-btn--active { background: var(--accent-dim); color: #fff; border-color: var(--accent); }

    /* canvas area */
    #canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      min-height: 0;
      position: relative;
    }
    #display {
      position: relative;
      border: 2px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      line-height: 0;
    }
    #canvas { display: block; }
    #video { display: none; }

    /* info banner */
    #info {
      position: absolute;
      top: 8px;
      left: 12px;
      font-size: 0.82rem;
      color: var(--text-dim);
    }

    /* profiler strip */
    #profiler {
      padding: 6px 16px 8px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      min-height: 28px;
      font-size: 0.78rem;
      font-family: monospace;
    }
    .prof-row {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 18px;
    }
    .prof-name {
      width: 100px;
      color: var(--text-muted);
      text-align: right;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .prof-bar {
      height: 10px;
      background: var(--accent);
      border-radius: 2px;
      flex-shrink: 0;
    }
    .prof-ms {
      color: var(--text);
      min-width: 60px;
    }
    .prof-total {
      color: var(--success);
      margin-top: 2px;
    }

    /* ---- controls panel (right) ---- */
    #controls-panel {
      width: var(--controls-w);
      min-width: var(--controls-w);
      background: var(--bg-panel);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px 14px;
    }
    #controls-panel h2 {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    #demo-desc {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 12px;
      line-height: 1.4;
    }

    /* controls */
    .ctrl-row {
      margin-bottom: 10px;
    }
    .ctrl-row--inline {
      display: flex;
      align-items: center;
    }
    .ctrl-label {
      display: block;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 3px;
    }
    .ctrl-value {
      float: right;
      font-size: 0.78rem;
      color: var(--accent);
      font-family: monospace;
    }
    .ctrl-slider {
      width: 100%;
      accent-color: var(--accent);
    }
    .ctrl-check-label {
      font-size: 0.82rem;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ctrl-select {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.82rem;
    }
    .ctrl-btn {
      width: 100%;
      background: var(--border);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.12s;
    }
    .ctrl-btn:hover { background: var(--accent-dim); }
    .ctrl-separator {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
      position: relative;
    }
    .ctrl-sep-label {
      position: absolute;
      top: -8px;
      left: 8px;
      background: var(--bg-panel);
      padding: 0 6px;
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* ---- hamburger (mobile) ---- */
    #hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    /* ---- page routes ---- */
    #page-content {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      color: var(--text);
    }
    #page-content h2 { color: var(--accent); margin-bottom: 16px; }
    #page-content p { color: var(--text-muted); line-height: 1.6; max-width: 600px; }

    /* ---- responsive ---- */
    @media (max-width: 768px) {
      .page { flex-direction: column; }

      #sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.2s;
        width: 260px;
        min-width: 0;
      }
      #sidebar.open { transform: translateX(0); }

      #hamburger { display: block; }

      #controls-panel {
        width: 100%;
        min-width: 0;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 200px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <h1>jsfeat</h1>
        <button id="hamburger-close" style="display:none;background:none;border:none;color:var(--text);font-size:1.2rem;cursor:pointer;">&times;</button>
      </div>
      <nav id="nav"></nav>
    </aside>

    <!-- Main area -->
    <div id="main">
      <!-- Toolbar -->
      <div id="toolbar">
        <button id="hamburger">&#9776;</button>
      </div>

      <!-- Demo canvas area -->
      <div id="canvas-area">
        <p id="info">Select a demo from the sidebar</p>
        <div id="display">
          <canvas id="canvas" width="640" height="480"></canvas>
          <video id="video" width="640" height="480" autoplay playsinline></video>
        </div>
      </div>

      <!-- Profiler strip -->
      <div id="profiler"></div>

      <!-- Static page content (for API / About routes) -->
      <div id="page-content"></div>
    </div>

    <!-- Controls panel (right) -->
    <aside id="controls-panel">
      <h2>Parameters</h2>
      <p id="demo-desc"></p>
      <div id="controls"></div>
    </aside>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
